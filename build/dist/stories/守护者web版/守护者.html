<!DOCTYPE html>
<html>
<head>
    <title>灯塔守护者的谜团 - 互动故事</title>
    <style>
        /* 为互动故事设置沉浸式暗色风格 */
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: Georgia, serif;
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #story {
            background-color: #222;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            line-height: 1.8;
        }
        #story p {
            margin: 0 0 15px 0;
        }
        .choice {
            background: #2a2a2a;
            padding: 12px 18px;
            margin: 8px 0;
            cursor: pointer;
            border-left: 4px solid #4a9eff;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .choice:hover {
            background: #3a3a3a;
            border-left-color: #ffaa4a;
        }
        .choice:active {
            background: #4a4a4a;
        }
        #title {
            text-align: center;
            font-size: 1.6em;
            color: #ffaa4a;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
        }
        #footer {
            text-align: center;
            margin-top: 25px;
            color: #777;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div id="story">
        <div id="title">🗼 灯塔守护者的谜团</div>
        <div id="content"></div>
    </div>
    <div id="footer">使用 InkGameScript 引擎 | 一个示例互动故事</div>

    <!-- 引入 inkjs 引擎库 -->
    <script src="js/ink.js"></script>
    <!-- 引入编译后的故事文件 -->
    <script src="守护者.js"></script>

    <script>
        // 创建故事实例
        var story = new inkjs.Story(storyContent); // storyContent 来自 lighthouse_mystery.js
        var storyContainer = document.getElementById("content");

        // 主循环：继续显示故事
        function continueStory() {
            while(story.canContinue) {
                var paragraphText = story.Continue();
                var paragraphElement = document.createElement('p');
                paragraphElement.innerHTML = paragraphText;
                storyContainer.appendChild(paragraphElement);
            }

            // 如果有选项，渲染它们
            if(story.currentChoices.length > 0) {
                for(var i = 0; i < story.currentChoices.length; i++) {
                    var choice = story.currentChoices[i];
                    var choiceElement = document.createElement('div');
                    choiceElement.classList.add("choice");
                    choiceElement.innerHTML = choice.text;
                    storyContainer.appendChild(choiceElement);

                    // 为每个选项绑定点击事件
                    (function(index) {
                        choiceElement.addEventListener("click", function() {
                            // 选择后，移除所有选项，继续故事
                            story.ChooseChoiceIndex(index);
                            removeChoices();
                            continueStory();
                            // 滚动到新内容
                            window.scrollTo(0, document.body.scrollHeight);
                        });
                    })(i);
                }
            }
        }

        // 辅助函数：移除所有已渲染的选项按钮
        function removeChoices() {
            var choices = storyContainer.querySelectorAll('.choice');
            for(var i = 0; i < choices.length; i++) {
                choices[i].remove();
            }
        }

        // 启动故事
        continueStory();
        // 滚动到顶部开始
        window.scrollTo(0, 0);
    </script>
</body>
</html>
