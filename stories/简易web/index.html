<!DOCTYPE html>
<html>
<head>
    <title>The Lighthouse Keeper's Mystery</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: Georgia, serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        #story {
            line-height: 2;/*1.6;*/
        }
        .choice {
            background: #2a2a2a;
            padding: 10px;
            margin: 10px 0;
            cursor: pointer;
            border-left: 3px solid #4a9eff;
        }
        .choice:hover {
            background: #3a3a3a;
        }
        /* 选择后 正文插入<hr>*/
        .ink-choice-divider {
    	border: none;
    	height: 1px;
    	background: linear-gradient(to right, transparent, rgba(120,120,120,0.55), transparent);
   	 margin: 1.6em 0;
        }
        body.dark .ink-choice-divider {
    	background: linear-gradient(to right, transparent, rgba(200,200,200,0.55), transparent);
        }
    </style>
</head>
<body>
    <div id="story"></div>
    <script src="ink.js"></script>
    <script src="灯塔守护者的谜团.js"></script>
    <script>
        var story = new inkjs.Story(storyContent);
        var storyContainer = document.getElementById("story");
        
        function continueStory() {
            while(story.canContinue) {
                var paragraphText = story.Continue();
                var paragraphElement = document.createElement('p');
                paragraphElement.innerHTML = paragraphText;
                storyContainer.appendChild(paragraphElement);
            }
            
            if(story.currentChoices.length > 0) {
                for(var i = 0; i < story.currentChoices.length; i++) {
                    var choice = story.currentChoices[i];
                    var choiceElement = document.createElement('div');
                    choiceElement.classList.add("choice");
                    choiceElement.innerHTML = choice.text;
                    storyContainer.appendChild(choiceElement);
                    
                    //等待选择  i = 0; i < story.currentChoices.length
                    (function(index) {
                        choiceElement.addEventListener("click", function() {
                            story.ChooseChoiceIndex(index);
                            removeChoices();
                            var divider = document.createElement('hr');
                            divider.className = 'ink-choice-divider';
                            storyContainer.appendChild(divider);
                            continueStory();
                        });
                    })(i);
                }
            }
        }
        
        function removeChoices() {
            var choices = storyContainer.querySelectorAll('.choice');
            for(var i = 0; i < choices.length; i++) {
                choices[i].remove();
            }
        }
        
        continueStory();
    </script>
</body>
</html>
